<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body
    style="
      background-image: url(book-21.gif);
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    "
  >
    <div style="padding: 60px">
      <div style="display: flex; justify-content: center">
        <span
          class="material-symbols-outlined"
          style="color: #800020; font-size: 60px"
        >
          import_contacts
        </span>
      </div>

      <div>
        <h1 style="color: black; font-weight: 1rem; letter-spacing: 3px">
          BOOKS ARE A JOURNEY OF THE MIND
        </h1>
        <hr
          style="
            background-color: #800020;
            height: 3px;
            width: 180px;
            border-radius: 20px;
          "
        />
        <p
          style="
            margin-top: 60px;
            color: #800020;
            text-align: center;
            font-weight: 900;
            font-size: 30px;
            letter-spacing: 2px;
          "
        >
            &nbsp;&nbsp;&nbsp;Read more, learn more, grow more.
        </p>
      </div>

      <div style="text-align: center">
        <span
          class="material-symbols-outlined"
          style="color: #800020; font-size: 60px"
        >
          favorite
        </span>
        <p
          style="
            text-align: center;
            font-style: italic;
            color: white;
            font-weight: 1rem;
            margin-top: 30px;
            font-size: 30px;
            color: black;
            font-weight: 900;
          "
        >
          A book is a dream that you hold in your hands.
        </p>
      </div>

      <div
        style="display: flex; justify-content: space-evenly; margin-top: 40px"
      >
        <div
          style="
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 160px;
            height: 210px;
            background-color: rgba(0, 0, 0, 0.5);
          "
        >
          <span
            class="material-symbols-outlined"
            style="color: gold; font-size: 80px; margin-top: 40px"
          >
            book_ribbon
          </span>
          <p style="letter-spacing: 3px; font-weight: 900">READ</p>
          <p style="font-weight: 500;">Discover new worlds.</p>
        </div>

        <div
          style="
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 160px;
            height: 210px;
          "
        >
          <span
            class="material-symbols-outlined"
            style="color: gold; font-size: 80px; margin-top: 40px"
          >
            school
          </span>
          <p style="letter-spacing: 3px; font-weight: 900">LEARN</p>
          <p style="font-weight: 500;">Gain new knowledge.</p>
        </div>

        <div
          style="
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 160px;
            height: 210px;
          "
        >
          <span
            class="material-symbols-outlined"
            style="color: gold; font-size: 80px; margin-top: 40px"
          >
            favorite
          </span>
          <p style="letter-spacing: 3px; font-weight: 900">LOVE</p>
          <p style="text-align: center; font-weight: 500;">Fall in love with reading.</p>
        </div>
      </div>
    </div>
  </body>
</html>
