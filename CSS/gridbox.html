<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridbox</title>
    <style>
        .inner{
            border: 2px solid blue;
            border-radius: 5px;
            background-color: violet;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div style="display: grid; border: 3px solid black; background-color: white; grid-template-columns: 250px 250px 250px;">
        <div class="inner">Item 1</div>
        <div class="inner">Item 2</div>
        <div class="inner">Item 3</div>
        <div class="inner">Item 4</div>
        <div class="inner">Item 5</div>
        <div class="inner">Item 6</div>
    </div>
</body>
</html>
